{% set name = "twarc" %}
{% set version = "2.14.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/twarc-{{ version }}.tar.gz
  sha256: 54537495c6575863769e82ba4a0db7d68538e7c5afa9b8fcc8856a0ae94d9fa0

build:
  entry_points:
    - twarc = twarc.command:main
    - twarc2 = twarc.command2:twarc2
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.3
    - pytest-runner
    - pip
  run:
    - python >=3.3
    - click >=7,<9
    - click-config-file >=0.6
    - click-plugins >=1
    - humanize >=3.9
    - python-dateutil >=2.8
    - requests-oauthlib >=1.3
    - tqdm >=4.62

test:
  imports:
    - twarc
  commands:
    - pip check
    - twarc --help
    - twarc2 --help
  requires:
    - pip

about:
  home: https://github.com/docnow/twarc
  summary: Archive tweets from the command line
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mfansler
